<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApniDukan - Professional Retail Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- TOP NAVIGATION BAR -->
    <nav class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50 px-4 py-3 flex justify-between items-center max-w-md mx-auto">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 text-white p-2.5 rounded-xl shadow-md shadow-green-100">
                <i class="fa-solid fa-shop text-lg"></i>
            </div>
            <div>
                <span class="text-[10px] text-gray-400 block font-medium uppercase tracking-wider" id="navStoreLocation">Ahmedabad, Live</span>
                <h1 class="text-md font-bold text-gray-800 tracking-tight" id="navStoreName">Loading Store...</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <!-- Language Selector Option Toggle -->
            <select id="langSelector" onchange="changeLanguage()" class="bg-gray-50 border border-gray-200 text-gray-700 text-xs rounded-lg p-1.5 focus:outline-none">
                <option value="hinglish">Hinglish</option>
                <option value="english">English</option>
                <option value="gujarati">ગુજરાતી</option>
            </select>
            <button onclick="openLoginModal()" id="sellerModeBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-2.5 py-2 rounded-lg transition-all flex items-center gap-1.5">
                <i class="fa-solid fa-lock text-green-600" id="lockIcon"></i> <span id="loginBtnText" data-key="sellerLogin">Seller Login</span>
            </button>
        </div>
    </nav>

    <!-- ========================================== -->
    <!-- MAIN INTERFACE CONTAINER -->
    <!-- ========================================== -->
    <div class="max-w-md mx-auto p-4 space-y-5">

        <!-- 1. PRO SELLER DASHBOARD -->
        <div id="sellerPanel" class="hidden space-y-4">
            <div class="bg-gradient-to-br from-green-600 to-emerald-700 rounded-2xl p-4 text-white shadow-lg flex justify-between items-center">
                <div>
                    <p class="text-xs text-green-100 font-semibold" data-key="welcomeSeller">Welcome Back, Seller!</p>
                    <h3 class="text-lg font-bold" data-key="manageStore">Manage Online Store</h3>
                </div>
                <button onclick="logoutSeller()" class="bg-red-500/20 hover:bg-red-500/40 text-white text-xs px-2.5 py-1.5 rounded-lg font-medium transition-all">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>

            <!-- Merchant Store Settings Setup Bundle -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-3">
                <h2 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-green-600"></i> <span data-key="storeSettings">Store Profile Settings</span>
                </h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="mDukanName" placeholder="Dukan Ka Naam" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none focus:border-green-500">
                    <input type="text" id="mWhatsapp" placeholder="WhatsApp Number (e.g., 91999...)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none focus:border-green-500">
                </div>
                <button onclick="saveStoreProfile()" class="w-full bg-gray-800 text-white text-xs font-bold py-2 rounded-xl transition-all">Save Profile Configurations</button>
            </div>

            <!-- Add Product Form -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-3">
                <h2 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-circle-plus text-green-600"></i> <span data-key="addNewItem">Naya Product Add Karein</span>
                </h2>
                
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-gray-200 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition-all">
                        <div class="flex flex-col items-center justify-center pt-3 pb-3">
                            <i class="fa-solid fa-camera text-xl text-gray-400 mb-1"></i>
                            <p class="text-xs text-gray-500 font-medium" data-key="clickPhoto">Click Product Photo</p>
                            <p id="fileName" class="text-[10px] text-green-600 font-semibold mt-1"></p>
                        </div>
                        <input type="file" id="productImage" accept="image/*" class="hidden" onchange="displayFileName()" />
                    </label>
                </div>

                <input type="text" id="pName" placeholder="Product Name" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-green-500">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="pPrice" placeholder="Price (₹)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-green-500">
                    <input type="text" id="pUnit" placeholder="Unit (e.g., 1kg, 500ml)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-green-500">
                </div>

                <select id="pCategory" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:outline-none focus:border-green-500 text-gray-600">
                    <option value="Groceries">Groceries / Kirana</option>
                    <option value="Dairy">Dairy & Milk Products</option>
                    <option value="Fruits">Fruits & Vegetables</option>
                    <option value="Snacks">Snacks & Beverages</option>
                    <option value="Others">Others</option>
                </select>
                
                <button onclick="addProductToFirebase()" id="uploadBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-md flex items-center justify-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> <span data-key="liveOnStore">Store Par Live Karein</span>
                </button>
            </div>

            <!-- Inventory Live Editor Grid Component -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-3">
                <h2 class="text-sm font-bold text-gray-800"><i class="fa-solid fa-list-check text-green-600 mr-1"></i> Live Inventory Items</h2>
                <div id="sellerInventoryList" class="space-y-2 max-h-64 overflow-y-auto">
                    <!-- Current live store items with live action delete items go here -->
                </div>
            </div>
        </div>

        <!-- 2. CUSTOMER VIEW MODULE -->
        <div id="customerPanel" class="space-y-4">
            <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none" id="categoryTabs">
                <button onclick="filterCategory('All')" class="bg-green-600 text-white text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap shadow-sm">All Items</button>
                <button onclick="filterCategory('Groceries')" class="bg-white border border-gray-100 text-gray-600 text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap">Groceries</button>
                <button onclick="filterCategory('Dairy')" class="bg-white border border-gray-100 text-gray-600 text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap">Dairy</button>
                <button onclick="filterCategory('Fruits')" class="bg-white border border-gray-100 text-gray-600 text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap">Fruits</button>
                <button onclick="filterCategory('Snacks')" class="bg-white border border-gray-100 text-gray-600 text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap">Snacks</button>
            </div>

            <div class="space-y-3">
                <h3 class="text-sm font-bold text-gray-800 px-1" data-key="availProducts">Available Products</h3>
                <div id="productsContainer" class="grid grid-cols-2 gap-3">
                    <p class="text-xs text-gray-400 col-span-2 text-center py-8">Loading digital catalog...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SELLER MASTER SECURITY LOGIN MODAL -->
    <div id="loginModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-xl">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-md text-gray-800">Merchant Access Lock</h3>
                <button onclick="closeLoginModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <input type="password" id="loginPassword" placeholder="Enter Security Password" class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-green-500">
            <button onclick="loginSeller()" id="loginSubmitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-md">Verify Password</button>
        </div>
    </div>

    <!-- CLIENT DETAILS CHECKOUT MODAL WINDOW -->
    <div id="checkoutModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-xl">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-md text-gray-800"><i class="fa-solid fa-truck text-green-600 mr-1"></i> Enter Delivery Details</h3>
                <button onclick="closeCheckoutModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="Aapka Naam / Your Name" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none">
                <input type="text" id="custPhone" placeholder="Mobile Number" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none">
                <textarea id="custAddress" placeholder="Pura Address / Delivery Location Details" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none h-20"></textarea>
                <button onclick="confirmAndRouteWhatsApp()" class="w-full bg-green-600 text-white font-bold py-2.5 rounded-xl text-xs tracking-wide">Confirm Order via WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- FIXED BOTTOM BAR FOR CUSTOMER CART VIEW -->
    <div id="customerCartBar" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-4 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] z-40 hidden">
        <div class="bg-green-600 rounded-xl p-3 flex justify-between items-center text-white shadow-md">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-basket-shopping"></i>
                <div class="text-xs">
                    <span id="cartCount" class="font-bold block">0 Items • ₹0</span>
                </div>
            </div>
            <button onclick="openCheckoutModal()" class="bg-white text-green-700 text-xs font-bold px-3 py-2 rounded-lg flex items-center gap-1 hover:bg-green-50 transition-all">
                <span data-key="checkoutBtn">Checkout Order</span> <i class="fa-brands fa-whatsapp text-sm text-green-600"></i>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- FIREBASE SYSTEM ENGINE MODULES -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDModwog0Tdj0avtqHJX0Qrj6XyEacuPD4",
            authDomain: "apnidukan-249fb.firebaseapp.com",
            projectId: "apnidukan-249fb",
            storageBucket: "apnidukan-249fb.firebasestorage.app",
            messagingSenderId: "288152844481",
            appId: "1:288152844481:web:ffc1667141a568f0f7dee0",
            measurementId: "G-1XZ6NSYDB7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let currentStoreId = urlParams.get('store') || "demo-store"; 
        
        let cart = [];
        let allProducts = [];
        let merchantConfigNumber = "919999999999"; // Fallback static value

        // Language Localization Dictionary Translation Blocks
        const langData = {
            hinglish: {
                sellerLogin: "Seller Login", welcomeSeller: "Welcome Back, Seller!", manageStore: "Manage Online Store",
                storeSettings: "Store Profile Settings", addNewItem: "Naya Product Add Karein", clickPhoto: "Click Product Photo",
                liveOnStore: "Store Par Live Karein", availProducts: "Available Products", checkoutBtn: "Checkout Order"
            },
            english: {
                sellerLogin: "Merchant Portal", welcomeSeller: "Hello Respected Vendor,", manageStore: "Store Operations Panel",
                storeSettings: "Vendor Configurations", addNewItem: "Publish New Catalog Item", clickPhoto: "Upload Inventory Image",
                liveOnStore: "Publish to Catalog", availProducts: "Digital Storefront Catalog", checkoutBtn: "Proceed to Checkout"
            },
            gujarati: {
                sellerLogin: "વેપારી લોગીન", welcomeSeller: "સ્વાગત છે, વેપારી મિત્ર!", manageStore: "ઓનલાઇન દુકાન મેનેજ કરો",
                storeSettings: "દુકાન પ્રોફાઇલ સેટિંગ્સ", addNewItem: "નવો સામાન ઉમેરો", clickPhoto: "પ્રોડક્ટ નો ફોટો પાડો",
                liveOnStore: "દુકાન પર લાઈવ કરો", availProducts: "દુકાન નો ઉપલબ્ધ સામાન", checkoutBtn: "ઓર્ડર કન્ફર્મ કરો"
            }
        };

        window.changeLanguage = function() {
            const currentSelectedLang = document.getElementById('langSelector').value;
            const dictionary = langData[currentSelectedLang];
            document.querySelectorAll("[data-key]").forEach(element => {
                const translationKey = element.getAttribute("data-key");
                if (dictionary[translationKey]) element.innerText = dictionary[translationKey];
            });
        }

        // Realtime loading of merchant customizable configuration profile
        async function loadMerchantProfile() {
            const profileRef = doc(db, "stores", currentStoreId);
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) {
                const data = profileSnap.data();
                document.getElementById('navStoreName').innerText = data.dukanName ? data.dukanName.toUpperCase() : currentStoreId.toUpperCase();
                merchantConfigNumber = data.whatsappNumber || "919999999999";
                
                document.getElementById('mDukanName').value = data.dukanName || "";
                document.getElementById('mWhatsapp').value = data.whatsappNumber || "";
            } else {
                document.getElementById('navStoreName').innerText = currentStoreId.replace('-', ' ').toUpperCase();
            }
        }

        window.saveStoreProfile = async function() {
            const dName = document.getElementById('mDukanName').value.trim();
            const wNum = document.getElementById('mWhatsapp').value.trim();
            if(!dName || !wNum) return alert("Pehle profile fields fill karo!");
            
            await setDoc(doc(db, "stores", currentStoreId), {
                dukanName: dName,
                whatsappNumber: wNum
            });
            alert("Store Profile Configurations Updated!");
            loadMerchantProfile();
        }

        window.displayFileName = function() {
            const fileInput = document.getElementById('productImage');
            const fileNameDisplay = document.getElementById('fileName');
            if(fileInput.files.length > 0) fileNameDisplay.innerText = "✓ Photo Attached";
        }

        const fileToDataUri = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (event) => resolve(event.target.result);
            reader.onerror = (error) => reject(error);
            reader.readAsDataURL(file);
        });

        // LOCK CONTROLS
        window.loginSeller = function() {
            const pass = document.getElementById('loginPassword').value.trim();
            if(pass === "786786") {
                document.getElementById('sellerPanel').classList.remove('hidden');
                document.getElementById('loginBtnText').innerText = "Dashboard Active";
                document.getElementById('lockIcon').className = "fa-solid fa-unlock text-green-600";
                sessionStorage.setItem("seller_logged_in", "true");
                closeLoginModal();
            } else {
                alert("Access Denied!");
            }
        }

        window.logoutSeller = function() {
            sessionStorage.removeItem("seller_logged_in");
            document.getElementById('sellerPanel').classList.add('hidden');
            document.getElementById('loginBtnText').innerText = "Seller Login";
            document.getElementById('lockIcon').className = "fa-solid fa-lock text-green-600";
        }

        if(sessionStorage.getItem("seller_logged_in") === "true") {
            document.getElementById('sellerPanel').classList.remove('hidden');
        }

        window.addProductToFirebase = async function() {
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const unit = document.getElementById('pUnit').value.trim();
            const cat = document.getElementById('pCategory').value;
            const fileInput = document.getElementById('productImage');
            const uploadBtn = document.getElementById('uploadBtn');

            if(!name || !price || !unit) return alert("All fields mandatory!");
            uploadBtn.innerText = "Syncing Catalogs...";

            let base64Img = "https://placehold.co/150?text=Product";
            try {
                if(fileInput.files.length > 0) base64Img = await fileToDataUri(fileInput.files[0]);
                await addDoc(collection(db, "products"), {
                    storeId: currentStoreId,
                    name, price: parseFloat(price), unit, category: cat, image: base64Img, createdAt: Date.now()
                });
                alert("Catalog Asset Updated Successfully!");
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
                document.getElementById('pUnit').value = "";
                fileInput.value = "";
                document.getElementById('fileName').innerText = "";
            } catch (e) { alert("Write rejection caught."); }
            finally { uploadBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Store Par Live Karein'; }
        }

        // REMOVE FROM INVENTORY ENGINE FUNCTION
        window.deleteProduct = async function(id) {
            if(confirm("Kya aap sach me is item ko catalog se hatana chahte ho?")) {
                await deleteDoc(doc(db, "products", id));
                alert("Item deleted!");
            }
        }

        function listenToLiveStoreCatalog() {
            const container = document.getElementById('productsContainer');
            const invList = document.getElementById('sellerInventoryList');
            const q = query(collection(db, "products"), where("storeId", "==", currentStoreId));

            onSnapshot(q, (snapshot) => {
                allProducts = [];
                container.innerHTML = "";
                invList.innerHTML = "";

                snapshot.forEach((doc) => {
                    let pData = doc.data();
                    pData.id = doc.id; // Inject unique internal cloud identifier
                    allProducts.push(pData);
                });

                renderProducts(allProducts);
                renderInventoryManager(allProducts);
            });
        }

        function renderProducts(items) {
            const container = document.getElementById('productsContainer');
            container.innerHTML = "";
            if(items.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 col-span-2 text-center py-8">Catalog is currently empty.</p>`;
                return;
            }
            items.forEach((product) => {
                container.innerHTML += `
                    <div class="bg-white border border-gray-100 rounded-xl p-3 shadow-sm flex flex-col justify-between space-y-2">
                        <div class="bg-gray-50 rounded-lg p-1 flex items-center justify-center aspect-square overflow-hidden">
                            <img src="${product.image}" alt="${product.name}" class="object-cover h-full w-full rounded-lg">
                        </div>
                        <div>
                            <h4 class="font-bold text-xs text-gray-800 line-clamp-1">${product.name}</h4>
                            <p class="text-[10px] text-gray-400 mt-0.5">${product.unit}</p>
                        </div>
                        <div class="flex justify-between items-center pt-1">
                            <span class="font-bold text-sm text-gray-800">₹${product.price}</span>
                            <button onclick="addToCart('${product.name}', ${product.price})" class="border border-green-600 text-green-600 text-[11px] font-bold px-2.5 py-1 rounded-lg bg-green-50/50 hover:bg-green-600 hover:text-white transition-all">ADD</button>
                        </div>
                    </div>
                `;
            });
        }

        // Live Seller Inventory Control Dashboard Panel List View Renderer
        function renderInventoryManager(items) {
            const invList = document.getElementById('sellerInventoryList');
            if(items.length === 0) { invList.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">No active database entries.</p>`; return; }
            items.forEach(p => {
                invList.innerHTML += `
                    <div class="flex items-center justify-between bg-gray-50 p-2 rounded-xl text-xs border border-gray-100">
                        <div class="flex items-center gap-2">
                            <img src="${p.image}" class="w-8 h-8 object-cover rounded-lg">
                            <div>
                                <span class="font-bold text-gray-800 block">${p.name}</span>
                                <span class="text-gray-400 text-[10px]">₹${p.price} • ${p.unit}</span>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-500 hover:text-red-700 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
            });
        }

        window.filterCategory = function(cat) {
            const tabs = document.querySelectorAll('#categoryTabs button');
            tabs.forEach(btn => {
                if(btn.innerText.toLowerCase().includes(cat.toLowerCase()) || (cat === 'All' && btn.innerText.includes('All'))) {
                    btn.className = "bg-green-600 text-white text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap shadow-sm";
                } else {
                    btn.className = "bg-white border border-gray-100 text-gray-600 text-xs font-semibold px-4 py-2 rounded-full whitespace-nowrap";
                }
            });
            if(cat === "All") renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.category === cat));
        }

        window.addToCart = function(name, price) {
            cart.push({ name, price });
            if(cart.length > 0) {
                document.getElementById('customerCartBar').classList.remove('hidden');
                document.getElementById('cartCount').innerText = `${cart.length} Items • Total: ₹${cart.reduce((sum, item) => sum + item.price, 0)}`;
            }
        }

        // WHATSAPP OUTBOUND STRING ROUTING LOGIC ENGINE
        window.confirmAndRouteWhatsApp = function() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddress').value.trim();

            if(!name || !phone || !addr) return alert("Delivery details form completion required!");

            let total = 0;
            let msg = `🛒 *NEW DIGITAL DUKAN ORDER*\n`;
            msg += `────────────────────\n`;
            msg += `👤 *Customer:* ${name}\n`;
            msg += `📞 *Phone:* ${phone}\n`;
            msg += `📍 *Delivery Address:* ${addr}\n`;
            msg += `────────────────────\n`;
            msg += `📦 *Order Items List:*\n`;

            cart.forEach((item, i) => {
                msg += `${i+1}. ${item.name} - ₹${item.price}\n`;
                total += item.price;
            });

            msg += `────────────────────\n`;
            msg += `💰 *Total Bill: ₹${total}*\n\n`;
            msg += `Kripya mera order accept karke dispatch processing update bhejiye!`;

            const parsedWhatsAppUrl = `https://wa.me/${merchantConfigNumber}?text=${encodeURIComponent(msg)}`;
            window.open(parsedWhatsAppUrl, '_blank');
            
            cart = [];
            document.getElementById('customerCartBar').classList.add('hidden');
            closeCheckoutModal();
        }

        loadMerchantProfile();
        listenToLiveStoreCatalog();
    </script>

    <!-- WINDOW MODAL CONTROLLERS -->
    <script>
        function openLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }
        function openCheckoutModal() { document.getElementById('checkoutModal').classList.remove('hidden'); }
        function closeCheckoutModal() { document.getElementById('checkoutModal').classList.add('hidden'); }
    </script>
</body>
</html>
