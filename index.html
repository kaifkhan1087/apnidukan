<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApniDukan - Premium Retail Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); 
            min-height: 100vh;
        }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="pb-28">

    <!-- TOP NAVIGATION BAR -->
    <nav class="bg-white/90 backdrop-blur-md shadow-sm border-b border-slate-100 sticky top-0 z-50 px-4 py-3.5 flex justify-between items-center max-w-md mx-auto rounded-b-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-emerald-500 to-green-600 text-white p-2.5 rounded-2xl shadow-lg shadow-emerald-100 active:scale-95 transition-transform">
                <i class="fa-solid fa-shop text-lg"></i>
            </div>
            <div>
                <span class="text-[9px] text-slate-400 block font-bold uppercase tracking-widest" id="navStoreLocation">Ahmedabad, Live</span>
                <h1 class="text-md font-extbbold text-slate-800 tracking-tight flex items-center gap-1">
                    <span id="navStoreName" class="font-bold">Loading Store...</span>
                </h1>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <select id="langSelector" onchange="changeLanguage()" class="bg-slate-50 border border-slate-200 text-slate-700 text-xs rounded-xl p-2 font-medium focus:outline-none focus:border-emerald-500 cursor-pointer transition-colors">
                <option value="hinglish">Hinglish</option>
                <option value="english">English</option>
                <option value="gujarati">ગુજરાતી</option>
            </select>
            <button onclick="openLoginModal()" id="sellerModeBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold px-3 py-2 rounded-xl transition-all flex items-center gap-1.5 active:scale-95">
                <i class="fa-solid fa-lock text-emerald-600" id="lockIcon"></i> <span id="loginBtnText" data-key="sellerLogin">Seller Login</span>
            </button>
        </div>
    </nav>

    <!-- ========================================== -->
    <!-- MAIN INTERFACE CONTAINER -->
    <!-- ========================================== -->
    <div class="max-w-md mx-auto p-4 space-y-6">

        <!-- 1. PRO SELLER DASHBOARD -->
        <div id="sellerPanel" class="hidden space-y-5 animate-fadeIn">
            <div class="bg-gradient-to-br from-slate-800 via-slate-900 to-emerald-950 rounded-3xl p-5 text-white shadow-xl flex justify-between items-center relative overflow-hidden">
                <div class="absolute -right-6 -bottom-6 text-white/5 text-9xl font-black pointer-events-none"><i class="fa-solid fa-circle-check"></i></div>
                <div class="relative z-10 space-y-0.5">
                    <p class="text-xs text-emerald-400 font-bold tracking-wider uppercase" data-key="welcomeSeller">Welcome Back, Seller!</p>
                    <h3 class="text-lg font-extrabold" data-key="manageStore">Manage Online Store</h3>
                </div>
                <button onclick="logoutSeller()" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 text-xs font-bold px-3 py-2 rounded-xl transition-all active:scale-95">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> Logout
                </button>
            </div>

            <!-- Merchant Store Settings Setup Bundle -->
            <div class="glass-card rounded-3xl p-5 shadow-xl shadow-slate-100/50 border border-white/60 space-y-4">
                <h2 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-emerald-500 text-base"></i> <span data-key="storeSettings">Store Profile Settings</span>
                </h2>
                <div class="space-y-3">
                    <div class="relative">
                        <i class="fa-solid fa-signature absolute left-3 top-3.5 text-slate-400 text-xs"></i>
                        <input type="text" id="mDukanName" placeholder="Dukan Ka Naam" class="w-full pl-9 pr-3 py-3 border border-slate-200/80 rounded-2xl text-xs bg-white focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 transition-all shadow-inner">
                    </div>
                    <div class="relative">
                        <i class="fa-brands fa-whatsapp absolute left-3 top-3.5 text-slate-400 text-sm"></i>
                        <input type="text" id="mWhatsapp" placeholder="WhatsApp Number (e.g., 91999...)" class="w-full pl-9 pr-3 py-3 border border-slate-200/80 rounded-2xl text-xs bg-white focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 transition-all shadow-inner">
                    </div>
                </div>
                <button onclick="saveStoreProfile()" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-extrabold py-3 rounded-2xl transition-all shadow-md active:scale-[0.99]">Save Profile Configurations</button>
            </div>

            <!-- Add Product Form -->
            <div class="glass-card rounded-3xl p-5 shadow-xl shadow-slate-100/50 border border-white/60 space-y-4">
                <h2 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-square-plus text-emerald-500 text-base"></i> <span data-key="addNewItem">Naya Product Add Karein</span>
                </h2>
                
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-slate-50/50 hover:bg-emerald-50/20 hover:border-emerald-400 transition-all group">
                        <div class="flex flex-col items-center justify-center pt-3 pb-3 text-center">
                            <i class="fa-solid fa-cloud-arrow-up text-xl text-slate-400 group-hover:text-emerald-500 group-hover:scale-110 transition-all mb-1.5"></i>
                            <p class="text-xs text-slate-600 font-semibold" data-key="clickPhoto">Click Product Photo</p>
                            <p id="fileName" class="text-[10px] text-emerald-600 font-bold mt-1 bg-emerald-50 px-2 py-0.5 rounded-full hidden"></p>
                        </div>
                        <input type="file" id="productImage" accept="image/*" class="hidden" onchange="displayFileName()" />
                    </label>
                </div>

                <input type="text" id="pName" placeholder="Product Name" class="w-full px-4 py-3 border border-slate-200/80 rounded-2xl text-xs focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 transition-all bg-white shadow-inner">
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="pPrice" placeholder="Price (₹)" class="w-full px-4 py-3 border border-slate-200/80 rounded-2xl text-xs focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 transition-all bg-white shadow-inner">
                    <input type="text" id="pUnit" placeholder="Unit (e.g., 1kg, 500ml)" class="w-full px-4 py-3 border border-slate-200/80 rounded-2xl text-xs focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 transition-all bg-white shadow-inner">
                </div>

                <select id="pCategory" class="w-full px-4 py-3 border border-slate-200/80 rounded-2xl text-xs bg-white focus:outline-none focus:border-emerald-500 text-slate-600 font-medium shadow-sm cursor-pointer">
                    <option value="Groceries">Groceries / Kirana</option>
                    <option value="Dairy">Dairy & Milk Products</option>
                    <option value="Fruits">Fruits & Vegetables</option>
                    <option value="Snacks">Snacks & Beverages</option>
                    <option value="Others">Others</option>
                </select>
                
                <button onclick="addProductToFirebase()" id="uploadBtn" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-extrabold py-3.5 rounded-2xl text-xs transition-all shadow-lg shadow-emerald-100 flex items-center justify-center gap-2 active:scale-[0.99]">
                    <i class="fa-solid fa-paper-plane"></i> <span data-key="liveOnStore">Store Par Live Karein</span>
                </button>
            </div>

            <!-- Inventory Live Editor Grid Component -->
            <div class="glass-card rounded-3xl p-5 shadow-xl shadow-slate-100/50 border border-white/60 space-y-3">
                <h2 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-boxes-stacked text-emerald-500"></i> Live Inventory Items
                </h2>
                <div id="sellerInventoryList" class="space-y-2.5 max-h-72 overflow-y-auto pr-1">
                    <!-- Current live store items go here -->
                </div>
            </div>
        </div>

        <!-- 2. CUSTOMER VIEW MODULE -->
        <div id="customerPanel" class="space-y-5">
            <!-- Category Filter Buttons -->
            <div class="flex gap-2.5 overflow-x-auto pb-2 scrollbar-none snap-x" id="categoryTabs">
                <button onclick="filterCategory('All')" class="bg-gradient-to-r from-emerald-500 to-green-600 text-white text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-md shadow-emerald-100 transition-all snap-center">All Items</button>
                <button onclick="filterCategory('Groceries')" class="bg-white border border-slate-100 text-slate-600 text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm hover:bg-slate-50 transition-all snap-center">Groceries</button>
                <button onclick="filterCategory('Dairy')" class="bg-white border border-slate-100 text-slate-600 text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm hover:bg-slate-50 transition-all snap-center">Dairy</button>
                <button onclick="filterCategory('Fruits')" class="bg-white border border-slate-100 text-slate-600 text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm hover:bg-slate-50 transition-all snap-center">Fruits</button>
                <button onclick="filterCategory('Snacks')" class="bg-white border border-slate-100 text-slate-600 text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm hover:bg-slate-50 transition-all snap-center">Snacks</button>
            </div>

            <div class="space-y-3">
                <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest px-1" data-key="availProducts">Available Products</h3>
                <div id="productsContainer" class="grid grid-cols-2 gap-3.5">
                    <p class="text-xs text-slate-400 col-span-2 text-center py-12 font-medium">Loading digital catalog...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SELLER MASTER SECURITY LOGIN MODAL -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl border border-slate-100 animate-scaleUp">
            <div class="flex justify-between items-center">
                <h3 class="font-extrabold text-md text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-emerald-500"></i> Merchant Access Lock
                </h3>
                <button onclick="closeLoginModal()" class="text-slate-400 hover:text-slate-600 bg-slate-50 p-2 rounded-full h-8 w-8 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="relative">
                <i class="fa-solid fa-key absolute left-3 top-3.5 text-slate-400 text-xs"></i>
                <input type="password" id="loginPassword" placeholder="Enter Security Password" class="w-full pl-9 pr-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/10 transition-all shadow-inner bg-slate-50/50">
            </div>
            <button onclick="loginSeller()" id="loginSubmitBtn" class="w-full bg-slate-900 hover:bg-black text-white font-extrabold py-3.5 rounded-2xl text-xs transition-all shadow-md active:scale-[0.99]">Verify Password</button>
        </div>
    </div>

    <!-- CLIENT DETAILS CHECKOUT MODAL WINDOW -->
    <div id="checkoutModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl border border-slate-100 animate-scaleUp">
            <div class="flex justify-between items-center">
                <h3 class="font-extrabold text-md text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-map-pin text-emerald-500"></i> Enter Delivery Details
                </h3>
                <button onclick="closeCheckoutModal()" class="text-slate-400 hover:text-slate-600 bg-slate-50 p-2 rounded-full h-8 w-8 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="Aapka Naam / Your Name" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-xs focus:outline-none focus:border-emerald-500 bg-slate-50/50 shadow-inner">
                <input type="text" id="custPhone" placeholder="Mobile Number" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-xs focus:outline-none focus:border-emerald-500 bg-slate-50/50 shadow-inner">
                <textarea id="custAddress" placeholder="Pura Address / Delivery Location Details" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-xs focus:outline-none focus:border-emerald-500 bg-slate-50/50 shadow-inner h-20 resize-none"></textarea>
                <button onclick="confirmAndRouteWhatsApp()" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-extrabold py-3.5 rounded-2xl text-xs tracking-wide shadow-lg shadow-emerald-100 active:scale-[0.99]">Confirm Order via WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- FIXED BOTTOM BAR FOR CUSTOMER CART VIEW -->
    <div id="customerCartBar" class="fixed bottom-4 left-4 right-4 max-w-sm mx-auto bg-slate-900/95 backdrop-blur-md rounded-2xl p-3 flex justify-between items-center text-white shadow-xl shadow-slate-900/20 z-40 hidden border border-white/10 animate-slideUp">
        <div class="flex items-center gap-3 pl-2">
            <div class="bg-emerald-500 text-white p-2 rounded-xl">
                <i class="fa-solid fa-basket-shopping text-sm"></i>
            </div>
            <div class="text-xs">
                <span id="cartCount" class="font-extrabold block text-slate-100">0 Items • ₹0</span>
                <span class="text-[9px] text-emerald-400 font-bold block uppercase tracking-wider">Ready to bag</span>
            </div>
        </div>
        <button onclick="openCheckoutModal()" class="bg-gradient-to-r from-emerald-400 to-emerald-500 hover:from-emerald-500 hover:to-emerald-600 text-slate-900 text-xs font-extrabold px-4 py-2.5 rounded-xl flex items-center gap-1.5 transition-all shadow-md active:scale-95">
            <span data-key="checkoutBtn">Checkout Order</span> <i class="fa-brands fa-whatsapp text-sm"></i>
        </button>
    </div>

    <!-- ========================================== -->
    <!-- FIREBASE SYSTEM ENGINE MODULES -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDModwog0Tdj0avtqHJX0Qrj6XyEacuPD4",
            authDomain: "apnidukan-249fb.firebaseapp.com",
            projectId: "apnidukan-249fb",
            storageBucket: "apnidukan-249fb.firebasestorage.app",
            messagingSenderId: "288152844481",
            appId: "1:288152844481:web:ffc1667141a568f0f7dee0",
            measurementId: "G-1XZ6NSYDB7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let currentStoreId = urlParams.get('store') || "demo-store"; 
        
        let cart = [];
        let allProducts = [];
        let merchantConfigNumber = "919999999999"; 

        const langData = {
            hinglish: {
                sellerLogin: "Seller Login", welcomeSeller: "Welcome Back, Seller!", manageStore: "Manage Online Store",
                storeSettings: "Store Profile Settings", addNewItem: "Naya Product Add Karein", clickPhoto: "Click Product Photo",
                liveOnStore: "Store Par Live Karein", availProducts: "Available Products", checkoutBtn: "Checkout Order"
            },
            english: {
                sellerLogin: "Merchant Portal", welcomeSeller: "Hello Respected Vendor,", manageStore: "Store Operations Panel",
                storeSettings: "Vendor Configurations", addNewItem: "Publish New Catalog Item", clickPhoto: "Upload Inventory Image",
                liveOnStore: "Publish to Catalog", availProducts: "Digital Storefront Catalog", checkoutBtn: "Proceed to Checkout"
            },
            gujarati: {
                sellerLogin: "વેપારી લોગીન", welcomeSeller: "સ્વાગત છે, વેપારી મિત્ર!", manageStore: "ઓનલાઇન દુકાન મેનેજ કરો",
                storeSettings: "દુકાન પ્રોફાઇલ સેટિંગ્સ", addNewItem: "નવો સામાન ઉમેરો", clickPhoto: "પ્રોડક્ટ નો ફોટો પાડો",
                liveOnStore: "દુકાન પર લાઈવ કરો", availProducts: "દુકાન નો ઉપલબ્ધ સામાન", checkoutBtn: "ઓર્ડર કન્ફર્મ કરો"
            }
        };

        window.changeLanguage = function() {
            const currentSelectedLang = document.getElementById('langSelector').value;
            const dictionary = langData[currentSelectedLang];
            document.querySelectorAll("[data-key]").forEach(element => {
                const translationKey = element.getAttribute("data-key");
                if (dictionary[translationKey]) element.innerText = dictionary[translationKey];
            });
        }

        async function loadMerchantProfile() {
            const profileRef = doc(db, "stores", currentStoreId);
            const profileSnap = await getDoc(profileRef);
            if(profileSnap.exists()) {
                const data = profileSnap.data();
                document.getElementById('navStoreName').innerText = data.dukanName ? data.dukanName.toUpperCase() : currentStoreId.toUpperCase();
                merchantConfigNumber = data.whatsappNumber || "919999999999";
                
                document.getElementById('mDukanName').value = data.dukanName || "";
                document.getElementById('mWhatsapp').value = data.whatsappNumber || "";
            } else {
                document.getElementById('navStoreName').innerText = currentStoreId.replace('-', ' ').toUpperCase();
            }
        }

        window.saveStoreProfile = async function() {
            const dName = document.getElementById('mDukanName').value.trim();
            const wNum = document.getElementById('mWhatsapp').value.trim();
            if(!dName || !wNum) return alert("Pehle profile fields fill karo!");
            
            await setDoc(doc(db, "stores", currentStoreId), {
                dukanName: dName,
                whatsappNumber: wNum
            });
            alert("Store Profile Configurations Updated!");
            loadMerchantProfile();
        }

        window.displayFileName = function() {
            const fileInput = document.getElementById('productImage');
            const fileNameDisplay = document.getElementById('fileName');
            if(fileInput.files.length > 0) {
                fileNameDisplay.innerText = "✓ Photo Attached";
                fileNameDisplay.classList.remove('hidden');
            }
        }

        const fileToDataUri = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (event) => resolve(event.target.result);
            reader.onerror = (error) => reject(error);
            reader.readAsDataURL(file);
        });

        window.loginSeller = function() {
            const pass = document.getElementById('loginPassword').value.trim();
            if(pass === "786786") {
                document.getElementById('sellerPanel').classList.remove('hidden');
                document.getElementById('loginBtnText').innerText = "Dashboard Active";
                document.getElementById('lockIcon').className = "fa-solid fa-unlock text-emerald-600";
                sessionStorage.setItem("seller_logged_in", "true");
                closeLoginModal();
            } else {
                alert("Access Denied!");
            }
        }

        window.logoutSeller = function() {
            sessionStorage.removeItem("seller_logged_in");
            document.getElementById('sellerPanel').classList.add('hidden');
            document.getElementById('loginBtnText').innerText = "Seller Login";
            document.getElementById('lockIcon').className = "fa-solid fa-lock text-emerald-600";
        }

        if(sessionStorage.getItem("seller_logged_in") === "true") {
            document.getElementById('sellerPanel').classList.remove('hidden');
        }

        window.addProductToFirebase = async function() {
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const unit = document.getElementById('pUnit').value.trim();
            const cat = document.getElementById('pCategory').value;
            const fileInput = document.getElementById('productImage');
            const uploadBtn = document.getElementById('uploadBtn');

            if(!name || !price || !unit) return alert("All fields mandatory!");
            uploadBtn.innerText = "Syncing Catalogs...";

            let base64Img = "https://placehold.co/150?text=Product";
            try {
                if(fileInput.files.length > 0) base64Img = await fileToDataUri(fileInput.files[0]);
                await addDoc(collection(db, "products"), {
                    storeId: currentStoreId,
                    name, price: parseFloat(price), unit, category: cat, image: base64Img, createdAt: Date.now()
                });
                alert("Catalog Asset Updated Successfully!");
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
                document.getElementById('pUnit').value = "";
                fileInput.value = "";
                fileName.classList.add('hidden');
            } catch (e) { alert("Write rejection caught."); }
            finally { uploadBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Store Par Live Karein'; }
        }

        window.deleteProduct = async function(id) {
            if(confirm("Kya aap sach me is item ko catalog se hatana chahte ho?")) {
                await deleteDoc(doc(db, "products", id));
                alert("Item deleted!");
            }
        }

        function listenToLiveStoreCatalog() {
            const container = document.getElementById('productsContainer');
            const invList = document.getElementById('sellerInventoryList');
            const q = query(collection(db, "products"), where("storeId", "==", currentStoreId));

            onSnapshot(q, (snapshot) => {
                allProducts = [];
                container.innerHTML = "";
                invList.innerHTML = "";

                snapshot.forEach((doc) => {
                    let pData = doc.data();
                    pData.id = doc.id; 
                    allProducts.push(pData);
                });

                renderProducts(allProducts);
                renderInventoryManager(allProducts);
            });
        }

        function renderProducts(items) {
            const container = document.getElementById('productsContainer');
            container.innerHTML = "";
            if(items.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 col-span-2 text-center py-12 font-medium">Catalog is currently empty.</p>`;
                return;
            }
            items.forEach((product) => {
                container.innerHTML += `
                    <div class="bg-white border border-slate-100/80 rounded-2xl p-3.5 shadow-sm hover:shadow-md transition-all flex flex-col justify-between space-y-3 relative group">
                        <div class="bg-slate-50/50 rounded-xl p-1 flex items-center justify-center aspect-square overflow-hidden relative shadow-inner">
                            <img src="${product.image}" alt="${product.name}" class="object-cover h-full w-full rounded-lg group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <div class="space-y-0.5">
                            <h4 class="font-extrabold text-xs text-slate-800 line-clamp-1 tracking-tight">${product.name}</h4>
                            <p class="text-[10px] text-slate-400 font-bold">${product.unit}</p>
                        </div>
                        <div class="flex justify-between items-center pt-0.5">
                            <span class="font-black text-sm text-slate-800">₹${product.price}</span>
                            <button onclick="addToCart('${product.name}', ${product.price})" class="border border-emerald-500 text-emerald-600 text-[11px] font-extrabold px-3 py-1.5 rounded-xl bg-emerald-50/30 hover:bg-emerald-500 hover:text-white transition-all shadow-sm active:scale-90">ADD</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderInventoryManager(items) {
            const invList = document.getElementById('sellerInventoryList');
            if(items.length === 0) { invList.innerHTML = `<p class="text-xs text-slate-400 text-center py-4">No active database entries.</p>`; return; }
            items.forEach(p => {
                invList.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-50 p-2.5 rounded-2xl text-xs border border-slate-100/60 shadow-sm">
                        <div class="flex items-center gap-3">
                            <img src="${p.image}" class="w-9 h-9 object-cover rounded-xl shadow-sm">
                            <div>
                                <span class="font-extrabold text-slate-800 block tracking-tight">${p.name}</span>
                                <span class="text-slate-400 text-[10px] font-bold">₹${p.price} • ${p.unit}</span>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" class="text-slate-400 hover:text-red-500 p-2 bg-white rounded-xl shadow-sm transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
            });
        }

        window.filterCategory = function(cat) {
            const tabs = document.querySelectorAll('#categoryTabs button');
            tabs.forEach(btn => {
                if(btn.innerText.toLowerCase().includes(cat.toLowerCase()) || (cat === 'All' && btn.innerText.includes('All'))) {
                    btn.className = "bg-gradient-to-r from-emerald-500 to-green-600 text-white text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-md shadow-emerald-100 transition-all snap-center";
                } else {
                    btn.className = "bg-white border border-slate-100 text-slate-600 text-xs font-bold px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm hover:bg-slate-50 transition-all snap-center";
                }
            });
            if(cat === "All") renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.category === cat));
        }

        window.addToCart = function(name, price) {
            cart.push({ name, price });
            if(cart.length > 0) {
                document.getElementById('customerCartBar').classList.remove('hidden');
                document.getElementById('cartCount').innerText = `${cart.length} Items • Total: ₹${cart.reduce((sum, item) => sum + item.price, 0)}`;
            }
        }

        window.confirmAndRouteWhatsApp = function() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddress').value.trim();

            if(!name || !phone || !addr) return alert("Delivery details form completion required!");

            let total = 0;
            let msg = `🛒 *NEW DIGITAL DUKAN ORDER*\n`;
            msg += `────────────────────\n`;
            msg += `👤 *Customer:* ${name}\n`;
            msg += `📞 *Phone:* ${phone}\n`;
            msg += `📍 *Delivery Address:* ${addr}\n`;
            msg += `────────────────────\n`;
            msg += `📦 *Order Items List:*\n`;

            cart.forEach((item, i) => {
                msg += `${i+1}. ${item.name} - ₹${item.price}\n`;
                total += item.price;
            });

            msg += `────────────────────\n`;
            msg += `💰 *Total Bill: ₹${total}*\n\n`;
            msg += `Kripya mera order accept karke dispatch processing update bhejiye!`;

            const parsedWhatsAppUrl = `https://wa.me/${merchantConfigNumber}?text=${encodeURIComponent(msg)}`;
            window.open(parsedWhatsAppUrl, '_blank');
            
            cart = [];
            document.getElementById('customerCartBar').classList.add('hidden');
            closeCheckoutModal();
        }

        loadMerchantProfile();
        listenToLiveStoreCatalog();
    </script>

    <!-- WINDOW MODAL CONTROLLERS -->
    <script>
        function openLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }
        function openCheckoutModal() { document.getElementById('checkoutModal').classList.remove('hidden'); }
        function closeCheckoutModal() { document.getElementById('checkoutModal').classList.add('hidden'); }
    </script>
</body>
</html>
